<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unity Stream — Secure VR Streaming Platform</title>
  <meta name="description"
    content="Unity Stream: Enterprise-grade encrypted VR video streaming with headset management. Secure, fast, immersive." />
  <!-- A-Frame WebXR for 360° VR viewing -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <!-- mpegts.js: required to play MPEG-2 TS (.ts) files in browser via MSE -->
  <script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.7.3/dist/mpegts.min.js"></script>
</head>

<body>
  <script>
    window.addEventListener('error', function(event) {
      if (document.body) {
        document.body.innerHTML += '<div style="position:fixed;top:0;left:0;width:100vw;height:100vh;background:#900;color:#fff;z-index:999999;padding:40px;font-family:monospace;font-size:16px;"><h1>CRITICAL ERROR:</h1><p>' + event.message + '</p><pre>' + (event.error ? event.error.stack : '') + '</pre></div>';
      }
    });
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
